{% extends 'layout.html' %}
{% block content %}
    <h1>Search Recipes</h1>

    <form method="GET" action="/">
        <input type="text" name="q" placeholder="Search..." value="{{ query }}">
        <button type="submit">Search</button>
    </form>

    <hr>

    <h2>Results</h2>

    {% for recipe in recipes %}
        <div>
            <h3>{{ recipe.title }}</h3>
            <img src="{{ recipe.image }}" width="150">
        </div>
{% endfor %}
{% endblock %}
